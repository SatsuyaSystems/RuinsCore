name: RuinsCore
version: '1.0-SNAPSHOT'
main: de.satsuya.ruinsCore.RuinsCore
api-version: '1.21'

permissions:
  ruinscore.command.ping:
    description: Erlaubt den /ping Command.
    default: true
  ruinscore.command.staffalert:
    description: Erlaubt den /staffalert Command.
    default: op
  ruinscore.command.money:
    description: Erlaubt den /money Command.
    default: true
  ruinscore.command.money.admin:
    description: Erlaubt Admin-Features für /money (set, add, remove, info).
    default: op
  ruinscore.command.pay:
    description: Erlaubt den /pay Command.
    default: true
  ruinscore.command.request:
    description: Erlaubt die /request und /requests Commands.
    default: true
  ruinscore.command.sudo:
    description: Erlaubt den /sudo Command.
    default: op
  ruinscore.command.gamemode:
    description: Erlaubt den /gm Command.
    default: op
  ruinscore.command.fly:
    description: Erlaubt den /fly Command.
    default: op
  ruinscore.command.speed:
    description: Erlaubt den /speed Command.
    default: op
  ruinscore.command.flyspeed:
    description: Erlaubt den /flyspeed Command.
    default: op
  ruinscore.command.resetallspeeds:
    description: Erlaubt den /resetallspeeds Command.
    default: op
  ruinscore.command.vanish:
    description: Erlaubt den /vanish Command.
    default: op
  ruinscore.command.fireball:
    description: Erlaubt den /fireball Command.
    default: op
  ruinscore.command.smite:
    description: Erlaubt den /smite Command.
    default: op
  ruinscore.command.msg:
    description: Erlaubt den /msg Command für private Nachrichten.
    default: true
  ruinscore.command.msg.spy:
    description: Erlaubt es, private Nachrichten anderer zu sehen.
    default: op
  ruinscore.command.supportmode:
    description: Erlaubt den /supportmode Command.
    default: op
  ruinscore.command.broadcast:
    description: Erlaubt den /bc Broadcast Command.
    default: op
  ruinscore.command.freeze:
    description: Erlaubt den /freeze Command.
    default: op
  ruinscore.command.invsee:
    description: Erlaubt den /invsee Command.
    default: op
  ruinscore.command.endersee:
    description: Erlaubt den /endersee Command.
    default: op
  ruinscore.chat.bypass:
    description: Erlaubt es, alle Chat-Nachrichten zu sehen und zu senden ohne Radius-Einschränkung.
    default: op
  ruinscore.command.warn:
    description: Erlaubt den /warn Command.
    default: op
  ruinscore.command.warns:
    description: Erlaubt den /warns Command.
    default: op
  ruinscore.command.size:
    description: Erlaubt den /size Command für die eigene Größe.
    default: true
  ruinscore.command.size.other:
    description: Erlaubt den /size Command für andere Spieler.
    default: op
  ruinscore.job.manage:
    description: Erlaubt Jobzuweisungen und Joblisten.
    default: op
  ruinscore.job.gui:
    description: Erlaubt das Job-Mitglieder-GUI.
    default: op
  ruinscore.auction.use:
    description: Erlaubt den /auction Command.
    default: true
  ruinscore.staff.alert.send:
    description: Erlaubt das Senden von Staff-Alerts.
    default: op
  ruinscore.staff.alert.receive:
    description: Erlaubt den Empfang von Staff-Alerts.
    default: op
  ruinscore.command.marry:
    description: Erlaubt den /marry Command zur Verheiratung von Spielern.
    default: op
  ruinscore.command.playtime:
    description: Erlaubt den /playtime Command.
    default: true
  ruinscore.command.playtime.other:
    description: Erlaubt die Spielzeit von anderen Spielern zu sehen.
    default: op
  ruinscore.command.pentagram:
    description: Erlaubt den /pentagram Command.
    default: op
  ruinscore.command.turlock.admin:
    description: Erlaubt die Verwaltung aller Türschlösser.
    default: op
  ruinscore.command.report.use:
    description: Erlaubt den /report Command.
    default: true
  ruinscore.command.report.view:
    description: Erlaubt das Report-GUI für Supporter.
    default: op
